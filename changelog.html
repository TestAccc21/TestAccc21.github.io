<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Changelog — Cmdr DLC</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root{--green:#00ff88;--green-dim:#00cc66;--bg:#060c08;--card-bg:#0b1a13;--border:rgba(0,255,136,0.20);--text:#d4ffe8;--muted:#3d7a5e}
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}html,body{height:100%}
    body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden;transition:background .6s}
    body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,136,.013) 2px,rgba(0,255,136,.013) 4px);pointer-events:none;z-index:9997}
    #particles{position:fixed;inset:0;pointer-events:none;z-index:0}
    #maintenance{display:none;position:fixed;inset:0;background:var(--bg);z-index:9999;flex-direction:column;align-items:center;justify-content:center;gap:1.8rem;text-align:center;padding:2rem}
    #maintenance .icon{font-size:4rem;animation:glow-pulse 2s infinite}
    #maintenance h1{font-family:'Share Tech Mono',monospace;font-size:clamp(1.6rem,5vw,2.8rem);color:var(--green);letter-spacing:.15em}
    #maintenance p{font-family:'Share Tech Mono',monospace;color:var(--muted);font-size:.9rem}
    .mbar{width:280px;height:2px;background:rgba(0,0,0,.4);border-radius:2px;overflow:hidden}
    .mbar-fill{height:100%;background:var(--green);width:0;animation:mload 2.8s ease-in-out infinite;box-shadow:0 0 10px var(--green)}
    nav{display:flex;align-items:center;justify-content:space-between;padding:1rem 2rem;border-bottom:1px solid var(--border);background:rgba(6,12,8,.95);backdrop-filter:blur(10px);position:sticky;top:0;z-index:100;transition:border-color .5s}
    .logo{font-family:'Share Tech Mono',monospace;font-size:1.2rem;color:var(--green);text-shadow:0 0 14px var(--green);letter-spacing:.12em;text-decoration:none;display:flex;align-items:center;gap:.55rem;transition:color .5s}
    .logo span{color:var(--muted)}.v-badge{font-family:'Share Tech Mono',monospace;font-size:.58rem;background:var(--green);color:#060c08;padding:.15rem .42rem;letter-spacing:.06em;font-weight:700;border-radius:2px;line-height:1.4}
    nav ul{list-style:none;display:flex;gap:1.6rem;align-items:center}
    nav a{color:var(--muted);text-decoration:none;font-size:.9rem;letter-spacing:.08em;text-transform:uppercase;font-weight:600;transition:color .2s}
    nav a:hover,nav a.active{color:var(--green)}.nav-icon{font-size:1.05rem;transition:transform .2s,filter .2s}
    .nav-icon:hover{transform:scale(1.2);filter:drop-shadow(0 0 5px var(--green))}
    .page-header{position:relative;padding:4.5rem 2rem 3rem;text-align:center;overflow:hidden;z-index:1}
    .page-header-bg{position:absolute;inset:0;background:radial-gradient(ellipse 60% 60% at 50% 0%,rgba(0,255,136,.09) 0%,transparent 70%)}
    .page-header>*{position:relative;z-index:1}
    .badge{display:inline-block;font-family:'Share Tech Mono',monospace;font-size:.72rem;color:var(--green);border:1px solid var(--border);padding:.28rem .85rem;letter-spacing:.2em;text-transform:uppercase;background:rgba(0,255,136,.05);margin-bottom:1rem;animation:fade-up .5s ease both}
    .page-header h1{font-family:'Share Tech Mono',monospace;font-size:clamp(2rem,6vw,4rem);color:var(--green);text-shadow:0 0 28px rgba(0,255,136,.45);letter-spacing:.1em;animation:fade-up .6s .1s ease both}
    .page-header p{margin-top:.9rem;color:var(--muted);font-size:.9rem;font-family:'Share Tech Mono',monospace;letter-spacing:.08em;animation:fade-up .6s .2s ease both}
    .cl-wrap{max-width:760px;margin:0 auto;padding:2rem 2rem 6rem;position:relative;z-index:1;flex:1}
    /* LOADING */
    .cl-loading{font-family:'Share Tech Mono',monospace;font-size:.8rem;color:var(--muted);text-align:center;padding:3rem;letter-spacing:.1em}
    /* ENTRY */
    .cl-entry{background:var(--card-bg);border:1px solid var(--border);margin-bottom:1.4rem;overflow:hidden;animation:fade-up .4s ease both;transition:border-color .5s,background .5s}
    .cl-entry:hover{border-color:rgba(0,255,136,.4)}
    .cl-entry-head{padding:1.1rem 1.4rem .8rem;display:flex;align-items:center;gap:.9rem;border-bottom:1px solid var(--border)}
    .cl-version{font-family:'Share Tech Mono',monospace;font-size:1.1rem;color:var(--green);letter-spacing:.08em;text-shadow:0 0 10px rgba(0,255,136,.3)}
    .cl-type-badge{display:inline-flex;align-items:center;gap:.3rem;font-family:'Share Tech Mono',monospace;font-size:.62rem;letter-spacing:.12em;padding:.2rem .6rem;border-radius:2px;text-transform:uppercase}
    .ct-update  {color:#88ddff;border:1px solid rgba(136,221,255,.35);background:rgba(136,221,255,.06)}
    .ct-new     {color:var(--green);border:1px solid rgba(0,255,136,.35);background:rgba(0,255,136,.06)}
    .ct-fix     {color:#ffcc88;border:1px solid rgba(255,204,136,.35);background:rgba(255,204,136,.06)}
    .ct-security{color:#ff88ff;border:1px solid rgba(255,136,255,.35);background:rgba(255,136,255,.06)}
    .ct-breaking{color:#ff4455;border:1px solid rgba(255,68,85,.35);background:rgba(255,68,85,.06)}
    .cl-date{font-family:'Share Tech Mono',monospace;font-size:.65rem;color:var(--muted);letter-spacing:.08em;margin-left:auto}
    .cl-entry-body{padding:.9rem 1.4rem 1.1rem}
    .cl-notes-line{display:flex;align-items:flex-start;gap:.7rem;font-size:.95rem;color:var(--text);line-height:1.6;margin-bottom:.35rem}
    .cl-notes-line::before{content:'[+]';font-family:'Share Tech Mono',monospace;font-size:.7rem;color:var(--green);flex-shrink:0;margin-top:.18rem;transition:color .5s}
    /* EMPTY */
    .cl-empty{font-family:'Share Tech Mono',monospace;font-size:.82rem;color:var(--muted);text-align:center;padding:3rem;letter-spacing:.1em;border:1px solid var(--border);background:var(--card-bg)}
    footer{border-top:1px solid var(--border);padding:1.2rem 2rem;text-align:center;font-family:'Share Tech Mono',monospace;font-size:.7rem;color:var(--muted);letter-spacing:.08em;position:relative;z-index:1;display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:.5rem}
    footer a{color:var(--green);text-decoration:none}footer a:hover{text-decoration:underline}
    .footer-sep{color:var(--border)}
    @keyframes fade-up{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    @keyframes glow-pulse{0%,100%{text-shadow:0 0 20px var(--green)}50%{text-shadow:0 0 50px var(--green)}}
    @keyframes mload{0%{width:0;opacity:1}80%{width:100%;opacity:1}100%{width:100%;opacity:0}}
  </style>
</head>
<body>
<canvas id="particles"></canvas>
<div id="maintenance"><div class="icon">⚙️</div><h1>Under Maintenance</h1><p>[ SYSTEM OFFLINE ]</p><div class="mbar"><div class="mbar-fill"></div></div></div>

<div id="main-content">
  <nav>
    <a class="logo" href="index.html">Cmdr <span>DLC</span> <span class="v-badge">v1</span></a>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="sneakpeek.html">Sneak Peek</a></li>
      <li><a href="changelog.html" class="active">Changelog</a></li>
      <li><a href="tos.html">Legal</a></li>
      <li><a class="nav-icon" href="https://discord.gg/XaZSGVFvzV" target="_blank" rel="noopener">💬</a></li>
      <li><a class="nav-icon" href="https://www.roblox.com/de/users/8377268005/profile" target="_blank" rel="noopener">🎮</a></li>
    </ul>
  </nav>

  <div class="page-header">
    <div class="page-header-bg"></div>
    <div class="badge">// Release History</div>
    <h1>CHANGELOG</h1>
    <p id="cl-subtitle">[ Loading entries... ]</p>
  </div>

  <div class="cl-wrap" id="cl-list">
    <div class="cl-loading">[ Fetching changelog... ]</div>
  </div>

  <footer>
    <span>© 2026 Cmdr DLC</span>
    <span class="footer-sep">|</span><a href="index.html">← Home</a>
    <span class="footer-sep">|</span><a href="https://discord.gg/XaZSGVFvzV" target="_blank" rel="noopener">Discord</a>
    <span class="footer-sep">|</span><a href="tos.html">Legal</a>
  </footer>
</div>

<script>
const SUPABASE_URL  = "https://zwdqajeziyvquagocctd.supabase.co";
const SUPABASE_ANON = "sb_publishable_uVQY0x9KdutfLIdzCOHd-A_eB6MAJNM";

const THEMES={default:{vars:{"--green":"#00ff88","--green-dim":"#00cc66","--bg":"#060c08","--card-bg":"#0b1a13","--border":"rgba(0,255,136,0.20)","--text":"#d4ffe8","--muted":"#3d7a5e"},particle:"0,255,136"},winter:{vars:{"--green":"#88ddff","--green-dim":"#55bbee","--bg":"#060d14","--card-bg":"#0a1520","--border":"rgba(136,221,255,0.22)","--text":"#d0eeff","--muted":"#3a6a88"},particle:"136,221,255"},easter:{vars:{"--green":"#c8ff88","--green-dim":"#aae055","--bg":"#0c0f06","--card-bg":"#141a0a","--border":"rgba(200,255,136,0.22)","--text":"#edffd0","--muted":"#5a7a3a"},particle:"200,255,136"},christmas:{vars:{"--green":"#ff4444","--green-dim":"#cc2222","--bg":"#080606","--card-bg":"#160c0c","--border":"rgba(255,68,68,0.22)","--text":"#ffd0d0","--muted":"#883a3a"},particle:"255,68,68"},halloween:{vars:{"--green":"#ff8800","--green-dim":"#cc6600","--bg":"#080500","--card-bg":"#140c00","--border":"rgba(255,136,0,0.22)","--text":"#ffddb0","--muted":"#885500"},particle:"255,136,0"},summer:{vars:{"--green":"#ffdd00","--green-dim":"#ccaa00","--bg":"#080700","--card-bg":"#141100","--border":"rgba(255,221,0,0.22)","--text":"#fff9cc","--muted":"#888800"},particle:"255,221,0"}};
function applyTheme(k){const t=THEMES[k]||THEMES.default;for(const[p,v]of Object.entries(t.vars))document.documentElement.style.setProperty(p,v);window.__pc=t.particle;}
async function loadSettings(){
  try{
    const res=await fetch(SUPABASE_URL+"/rest/v1/settings?select=key,value",{method:"GET",mode:"cors",headers:{"apikey":SUPABASE_ANON,"Authorization":"Bearer "+SUPABASE_ANON,"Content-Type":"application/json"}});
    if(!res.ok)throw new Error();
    const rows=await res.json();const map=Object.fromEntries(rows.map(r=>[r.key,r.value]));
    if(map.maintenance==="true"){document.getElementById("maintenance").style.display="flex";document.getElementById("main-content").style.display="none";}
    applyTheme(map.theme||"default");
    // Announcement banner
    if(map.announcement){
      try{
        const a=JSON.parse(map.announcement);
        if(a.text){showBanner(a.text,a.type);}
      }catch(e){}
    }
  }catch(e){applyTheme("default");}
}

const BANNER_COLORS={info:'#88ddff',warn:'#ffcc00',success:'#00ff88',event:'#ff88cc'};
function showBanner(text,type){
  const existing=document.getElementById('ann-banner');if(existing)existing.remove();
  const b=document.createElement('div');b.id='ann-banner';
  const col=BANNER_COLORS[type]||'#88ddff';
  b.style.cssText='position:sticky;top:64px;z-index:90;padding:.55rem 2rem;background:rgba(6,12,8,.95);border-bottom:1px solid '+col+';font-family:\'Share Tech Mono\',monospace;font-size:.75rem;color:'+col+';letter-spacing:.08em;text-align:center;backdrop-filter:blur(8px)';
  b.textContent=text;
  const nav=document.querySelector('nav');if(nav&&nav.nextSibling)nav.parentNode.insertBefore(b,nav.nextSibling);else document.body.appendChild(b);
}

const TYPE_ICONS={update:'🔧',new:'✨',fix:'🐛',security:'🔒',breaking:'⚠️'};
const TYPE_CSS={update:'ct-update',new:'ct-new',fix:'ct-fix',security:'ct-security',breaking:'ct-breaking'};

async function loadChangelog(){
  const list=document.getElementById('cl-list');
  try{
    const res=await fetch(SUPABASE_URL+"/rest/v1/changelog?select=id,version,type,notes,published_at&order=published_at.desc",{method:"GET",mode:"cors",headers:{"apikey":SUPABASE_ANON,"Authorization":"Bearer "+SUPABASE_ANON,"Content-Type":"application/json"}});
    if(!res.ok)throw new Error("HTTP "+res.status);
    const rows=await res.json();

    document.getElementById('cl-subtitle').textContent='[ '+rows.length+' release'+(rows.length===1?'':'s')+' · Latest: '+(rows[0]?rows[0].version:'—')+' ]';

    if(!rows.length){
      list.innerHTML='<div class="cl-empty">[ No changelog entries yet — check back soon ]</div>';return;
    }

    let html='';
    rows.forEach((r,i)=>{
      const date=new Date(r.published_at).toLocaleDateString('en-GB',{day:'2-digit',month:'long',year:'numeric'});
      const icon=TYPE_ICONS[r.type]||'🔧';
      const css=TYPE_CSS[r.type]||'ct-update';
      const lines=(r.notes||'').split('\n').map(l=>l.replace(/^[-*]\s*/,'')).filter(l=>l.trim());
      const linesHtml=lines.map(l=>'<div class="cl-notes-line">'+escHtml(l)+'</div>').join('');
      html+=`<div class="cl-entry" style="animation-delay:${i*0.06}s">
        <div class="cl-entry-head">
          <div class="cl-version">${escHtml(r.version)}</div>
          <span class="cl-type-badge ${css}">${icon} ${escHtml(r.type)}</span>
          <div class="cl-date">${date}</div>
        </div>
        <div class="cl-entry-body">${linesHtml||'<div class="cl-notes-line">No details provided.</div>'}</div>
      </div>`;
    });
    list.innerHTML=html;
  }catch(e){
    list.innerHTML='<div class="cl-empty">[ Could not load changelog — '+e.message+' ]</div>';
  }
}

function escHtml(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function initParticles(){const c=document.getElementById('particles'),x=c.getContext('2d');let W,H,pts=[];function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;}resize();window.addEventListener('resize',resize);const col=()=>window.__pc||'0,255,136';function rnd(a,b){return a+Math.random()*(b-a);}function mkP(){return{x:rnd(0,W),y:rnd(0,H),r:rnd(.5,2),vx:rnd(-.12,.12),vy:rnd(-.3,-.06),a:rnd(.15,.6),fade:rnd(.002,.005)};}for(let i=0;i<130;i++)pts.push(mkP());function draw(){x.clearRect(0,0,W,H);x.shadowColor='rgb('+col()+')';x.shadowBlur=5;for(let p of pts){x.beginPath();x.arc(p.x,p.y,p.r,0,Math.PI*2);x.fillStyle='rgba('+col()+','+p.a+')';x.fill();p.x+=p.vx;p.y+=p.vy;p.a-=p.fade;if(p.a<=0||p.y<-8){Object.assign(p,mkP());p.y=H+5;p.a=rnd(.15,.6);}}requestAnimationFrame(draw);}draw();}

loadSettings().then(()=>{ initParticles(); loadChangelog(); });
</script>
</body>
</html>
