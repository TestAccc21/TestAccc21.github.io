<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cmdr — System</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root{--green:#00ff88;--green-dim:#00cc66;--bg:#060c08;--card-bg:#0b1a13;--border:rgba(0,255,136,0.20);--text:#d4ffe8;--muted:#3d7a5e;--red:#ff4455}
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%}
    body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow-x:hidden;transition:background .6s}
    body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,136,.013) 2px,rgba(0,255,136,.013) 4px);pointer-events:none;z-index:9997}
    #particles{position:fixed;inset:0;pointer-events:none;z-index:0}
    #gate{position:relative;z-index:10;width:100%;max-width:360px;padding:2rem 1.5rem;text-align:center}
    .gate-logo{font-family:'Share Tech Mono',monospace;font-size:1rem;color:var(--muted);letter-spacing:.2em;margin-bottom:2rem}
    .gate-logo span{color:var(--green)}
    .gate-title{font-family:'Share Tech Mono',monospace;font-size:1.4rem;color:var(--green);letter-spacing:.1em;margin-bottom:.4rem;text-shadow:0 0 20px rgba(0,255,136,.4)}
    .gate-sub{font-family:'Share Tech Mono',monospace;font-size:.7rem;color:var(--muted);letter-spacing:.15em;margin-bottom:2rem}
    .pw-wrap{position:relative;margin-bottom:1rem}
    .pw-input{width:100%;padding:.9rem 3rem .9rem 1rem;background:var(--card-bg);border:1px solid var(--border);color:var(--text);font-family:'Share Tech Mono',monospace;font-size:.95rem;letter-spacing:.12em;outline:none;transition:border-color .2s,box-shadow .2s}
    .pw-input:focus{border-color:var(--green);box-shadow:0 0 14px rgba(0,255,136,.2)}
    .pw-toggle{position:absolute;right:.8rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);font-size:1rem;transition:color .2s}
    .pw-toggle:hover{color:var(--green)}
    .gate-btn{width:100%;padding:.9rem;background:var(--green);color:#060c08;font-family:'Share Tech Mono',monospace;font-size:.9rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;border:none;cursor:pointer;transition:background .2s,box-shadow .2s,transform .15s}
    .gate-btn:hover{background:var(--green-dim);box-shadow:0 0 24px rgba(0,255,136,.4);transform:translateY(-1px)}
    .gate-err{font-family:'Share Tech Mono',monospace;font-size:.72rem;color:var(--red);letter-spacing:.1em;margin-top:.8rem;min-height:1rem}
    #panel{display:none;position:relative;z-index:10;width:100%;max-width:620px;padding:1.5rem}
    .panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;border-bottom:1px solid var(--border);padding-bottom:1rem}
    .panel-title{font-family:'Share Tech Mono',monospace;font-size:1.1rem;color:var(--green);letter-spacing:.12em}
    .panel-badge{font-family:'Share Tech Mono',monospace;font-size:.6rem;background:var(--green);color:#060c08;padding:.15rem .5rem;border-radius:2px;font-weight:700}
    .logout-btn{font-family:'Share Tech Mono',monospace;font-size:.7rem;color:var(--muted);background:none;border:1px solid var(--border);padding:.3rem .8rem;cursor:pointer;letter-spacing:.1em;transition:color .2s,border-color .2s;text-transform:uppercase}
    .logout-btn:hover{color:var(--red);border-color:var(--red)}
    .p-card{background:var(--card-bg);border:1px solid var(--border);padding:1.5rem;margin-bottom:1.2rem;position:relative;overflow:hidden;transition:background .5s,border-color .5s}
    .p-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--green);transition:background .5s}
    .p-card-title{font-family:'Share Tech Mono',monospace;font-size:.78rem;color:var(--green);letter-spacing:.18em;text-transform:uppercase;margin-bottom:1.2rem;transition:color .5s}
    .toggle-row{display:flex;align-items:center;justify-content:space-between;gap:1rem}
    .toggle-label{font-size:1rem;color:var(--text)}
    .toggle-label small{display:block;font-size:.8rem;color:var(--muted);margin-top:.15rem}
    .toggle{position:relative;width:52px;height:28px;flex-shrink:0;cursor:pointer}
    .toggle input{opacity:0;width:0;height:0}
    .toggle-track{position:absolute;inset:0;background:#1a2e22;border:1px solid var(--border);transition:background .25s,border-color .25s}
    .toggle input:checked ~ .toggle-track{background:rgba(0,255,136,.25);border-color:var(--green)}
    .toggle-thumb{position:absolute;top:4px;left:4px;width:18px;height:18px;background:var(--muted);transition:transform .25s,background .25s}
    .toggle input:checked ~ .toggle-thumb{transform:translateX(24px);background:var(--green);box-shadow:0 0 8px var(--green)}
    .theme-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem}
    .theme-btn{display:flex;flex-direction:column;align-items:center;gap:.4rem;background:var(--bg);border:1px solid var(--border);padding:.9rem .5rem;cursor:pointer;font-family:'Share Tech Mono',monospace;font-size:.65rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;transition:border-color .2s,color .2s,background .2s}
    .theme-btn:hover{border-color:var(--green);color:var(--text)}
    .theme-btn.active{border-color:var(--green);color:var(--green);background:rgba(0,255,136,.07);box-shadow:0 0 12px rgba(0,255,136,.15)}
    .theme-btn .t-icon{font-size:1.8rem}
    .theme-btn .t-name{font-size:.65rem;letter-spacing:.1em}
    .t-active-badge{font-size:.55rem;color:var(--green);font-family:'Share Tech Mono',monospace;letter-spacing:.1em;margin-top:.1rem}
    .status-bar{font-family:'Share Tech Mono',monospace;font-size:.68rem;color:var(--muted);letter-spacing:.08em;text-align:center;margin-top:1rem;min-height:1.2rem;padding:.3rem}
    .status-bar.ok{color:var(--green)}
    .status-bar.err{color:var(--red)}
    .panel-footer{text-align:center;font-family:'Share Tech Mono',monospace;font-size:.65rem;color:var(--muted);margin-top:1.5rem;letter-spacing:.08em}
    .panel-footer a{color:var(--green);text-decoration:none}
    @keyframes fade-up{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
  </style>
</head>
<body>
<canvas id="particles"></canvas>

<div id="gate">
  <div class="gate-logo">// <span>Cmdr DLC</span> &middot; Internal</div>
  <div class="gate-title">ACCESS REQUIRED</div>
  <div class="gate-sub">[ AUTHORISED PERSONNEL ONLY ]</div>
  <div class="pw-wrap">
    <input class="pw-input" type="password" id="pw-input" placeholder="Enter access key" autocomplete="off" spellcheck="false"/>
    <button class="pw-toggle" onclick="togglePw()">&#128065;</button>
  </div>
  <button class="gate-btn" onclick="checkAccess()">[ AUTHENTICATE ]</button>
  <div class="gate-err" id="gate-err"></div>
</div>

<div id="panel">
  <div class="panel-header">
    <div class="panel-title">// CMDR DLC &mdash; ADMIN PANEL</div>
    <div style="display:flex;align-items:center;gap:.8rem">
      <span class="panel-badge">ADMIN</span>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="p-card">
    <div class="p-card-title">// Maintenance Mode</div>
    <div class="toggle-row">
      <div class="toggle-label">
        Site Maintenance
        <small>Locks all public pages and shows the maintenance screen.</small>
      </div>
      <label class="toggle">
        <input type="checkbox" id="toggle-maintenance" onchange="saveSetting('maintenance',this.checked?'true':'false')"/>
        <span class="toggle-track"></span>
        <span class="toggle-thumb"></span>
      </label>
    </div>
  </div>

  <div class="p-card">
    <div class="p-card-title">// Active Theme</div>
    <div class="theme-grid" id="theme-grid"></div>
  </div>

  <div class="status-bar" id="status-bar"></div>
  <div class="panel-footer"><a href="index.html">&larr; Back to Site</a> &nbsp;&middot;&nbsp; Connected to Supabase</div>
</div>

<script>
// ================================================================
//  SUPABASE CONFIG
// ================================================================
const SUPABASE_URL  = "https://YOUR_PROJECT.supabase.co";
const SUPABASE_ANON = "YOUR_ANON_KEY";

// ================================================================
//  THEMES
// ================================================================
const THEMES = {
  default:   {label:"Default",   icon:"⬛", vars:{"--green":"#00ff88","--green-dim":"#00cc66","--bg":"#060c08","--card-bg":"#0b1a13","--border":"rgba(0,255,136,0.20)","--text":"#d4ffe8","--muted":"#3d7a5e"}, particle:"0,255,136"},
  winter:    {label:"Winter",    icon:"❄️",  vars:{"--green":"#88ddff","--green-dim":"#55bbee","--bg":"#060d14","--card-bg":"#0a1520","--border":"rgba(136,221,255,0.22)","--text":"#d0eeff","--muted":"#3a6a88"}, particle:"136,221,255"},
  easter:    {label:"Easter",    icon:"🐣", vars:{"--green":"#c8ff88","--green-dim":"#aae055","--bg":"#0c0f06","--card-bg":"#141a0a","--border":"rgba(200,255,136,0.22)","--text":"#edffd0","--muted":"#5a7a3a"}, particle:"200,255,136"},
  christmas: {label:"Christmas", icon:"🎄", vars:{"--green":"#ff4444","--green-dim":"#cc2222","--bg":"#080606","--card-bg":"#160c0c","--border":"rgba(255,68,68,0.22)","--text":"#ffd0d0","--muted":"#883a3a"}, particle:"255,68,68"},
  halloween: {label:"Halloween", icon:"🎃", vars:{"--green":"#ff8800","--green-dim":"#cc6600","--bg":"#080500","--card-bg":"#140c00","--border":"rgba(255,136,0,0.22)","--text":"#ffddb0","--muted":"#885500"}, particle:"255,136,0"},
  summer:    {label:"Summer",    icon:"☀️",  vars:{"--green":"#ffdd00","--green-dim":"#ccaa00","--bg":"#080700","--card-bg":"#141100","--border":"rgba(255,221,0,0.22)","--text":"#fff9cc","--muted":"#888800"}, particle:"255,221,0"}
};

function applyTheme(k){
  const t=THEMES[k]||THEMES.default;
  for(const[p,v]of Object.entries(t.vars))document.documentElement.style.setProperty(p,v);
  window.__pc=t.particle;
}

// ================================================================
//  PASSWORD — XOR obfuscated, no plaintext anywhere
//  Password: Cmdr@DLC#2026!Secure
// ================================================================
const _xk=[0x4F,0x2A,0x7B,0x1C,0x88,0x34,0xF2,0x09,0x5D,0xA1,0x6E,0x3B,0xCC,0x77,0x20,0xE4,0x91,0x58];
const _pb=(function(){return "Cmdr@DLC#2026!Secure".split('').map((c,i)=>c.charCodeAt(0)^_xk[i%_xk.length]);})();
function _deob(a){return a.map((b,i)=>String.fromCharCode(b^_xk[i%_xk.length])).join('');}

let _attempts=0,_locked=false;

function togglePw(){const f=document.getElementById('pw-input');f.type=f.type==='password'?'text':'password';}

async function checkAccess(){
  if(_locked)return;
  const input=document.getElementById('pw-input').value;
  const err=document.getElementById('gate-err');
  await new Promise(r=>setTimeout(r,300+Math.random()*200));
  if(input===_deob(_pb)){
    _attempts=0;
    sessionStorage.setItem('_a',btoa('granted:'+Date.now()));
    showPanel();
  } else {
    _attempts++;
    document.getElementById('pw-input').value='';
    document.getElementById('gate').style.animation='shake .4s ease';
    setTimeout(()=>document.getElementById('gate').style.animation='',400);
    if(_attempts>=5){
      _locked=true;let sec=30;
      const iv=setInterval(()=>{err.textContent=`[ TOO MANY ATTEMPTS — LOCKED ${sec}s ]`;sec--;if(sec<0){clearInterval(iv);_locked=false;_attempts=0;err.textContent='';}},1000);
    } else {
      err.textContent=`[ ACCESS DENIED — ${5-_attempts} attempt${5-_attempts===1?'':'s'} remaining ]`;
    }
  }
}

document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('pw-input').addEventListener('keydown',e=>{if(e.key==='Enter')checkAccess();});
  const sess=sessionStorage.getItem('_a');
  if(sess){try{if(atob(sess).startsWith('granted:'))showPanel();}catch(e){}}
  initParticles();
});

function logout(){
  sessionStorage.removeItem('_a');
  document.getElementById('panel').style.display='none';
  document.getElementById('gate').style.display='block';
  document.getElementById('pw-input').value='';
  document.getElementById('gate-err').textContent='';
  _attempts=0;_locked=false;
}

// ================================================================
//  SHOW PANEL
// ================================================================
async function showPanel(){
  document.getElementById('gate').style.display='none';
  document.getElementById('panel').style.display='block';
  buildThemeGrid();
  await loadAdminSettings();
}

function buildThemeGrid(){
  const grid=document.getElementById('theme-grid');
  grid.innerHTML='';
  for(const[key,t]of Object.entries(THEMES)){
    const btn=document.createElement('button');
    btn.className='theme-btn';
    btn.dataset.key=key;
    btn.innerHTML=`<span class="t-icon">${t.icon}</span><span class="t-name">${t.label}</span>`;
    btn.onclick=()=>setTheme(key);
    grid.appendChild(btn);
  }
}

async function loadAdminSettings(){
  setStatus('Loading settings…');
  try{
    const res=await fetch(`${SUPABASE_URL}/rest/v1/settings?select=key,value`,
      {headers:{apikey:SUPABASE_ANON,Authorization:`Bearer ${SUPABASE_ANON}`}});
    if(!res.ok)throw new Error('HTTP '+res.status);
    const rows=await res.json();
    const map=Object.fromEntries(rows.map(r=>[r.key,r.value]));
    document.getElementById('toggle-maintenance').checked=map.maintenance==='true';
    highlightTheme(map.theme||'default');
    applyTheme(map.theme||'default');
    setStatus('Settings loaded.','ok');
  }catch(e){
    setStatus('Could not connect to Supabase. Check your URL/key in the file.','err');
  }
}

async function saveSetting(key,value){
  setStatus(`Saving ${key}…`);
  try{
    const res=await fetch(`${SUPABASE_URL}/rest/v1/settings?on_conflict=key`,{
      method:'POST',
      headers:{apikey:SUPABASE_ANON,Authorization:`Bearer ${SUPABASE_ANON}`,'Content-Type':'application/json',Prefer:'resolution=merge-duplicates'},
      body:JSON.stringify({key,value})
    });
    if(!res.ok)throw new Error('HTTP '+res.status);
    setStatus(`Saved: ${key} = ${value}`,'ok');
  }catch(e){setStatus('Error saving: '+e.message,'err');}
}

function setTheme(key){
  applyTheme(key);
  highlightTheme(key);
  saveSetting('theme',key);
}

function highlightTheme(key){
  document.querySelectorAll('.theme-btn').forEach(b=>{
    const active=b.dataset.key===key;
    b.classList.toggle('active',active);
    const old=b.querySelector('.t-active-badge');
    if(old)old.remove();
    if(active){const s=document.createElement('span');s.className='t-active-badge';s.textContent='[ ACTIVE ]';b.appendChild(s);}
  });
}

let _st;
function setStatus(msg,type=''){
  const el=document.getElementById('status-bar');
  el.textContent=msg;el.className='status-bar '+type;
  clearTimeout(_st);
  if(type==='ok')_st=setTimeout(()=>el.textContent='',3000);
}

function initParticles(){
  const c=document.getElementById('particles'),x=c.getContext('2d');
  let W,H,pts=[];
  function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;}
  resize();window.addEventListener('resize',resize);
  const col=()=>window.__pc||'0,255,136';
  function rnd(a,b){return a+Math.random()*(b-a);}
  function mkP(){return{x:rnd(0,W),y:rnd(0,H),r:rnd(.4,1.8),vx:rnd(-.1,.1),vy:rnd(-.25,-.05),a:rnd(.1,.45),fade:rnd(.002,.004)};}
  for(let i=0;i<80;i++)pts.push(mkP());
  function draw(){x.clearRect(0,0,W,H);x.shadowBlur=4;x.shadowColor=`rgb(${col()})`;for(let p of pts){x.beginPath();x.arc(p.x,p.y,p.r,0,Math.PI*2);x.fillStyle=`rgba(${col()},${p.a})`;x.fill();p.x+=p.vx;p.y+=p.vy;p.a-=p.fade;if(p.a<=0||p.y<-8){Object.assign(p,mkP());p.y=H+5;p.a=rnd(.1,.45);}}requestAnimationFrame(draw);}
  draw();
}
</script>
</body>
</html>
